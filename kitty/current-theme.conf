# The basic colors
foreground              #CDD6F4
background              #1B2C3D
selection_foreground    #11111a
selection_background    #F5E0DC

# Cursor colors
cursor                  #00F0FF
cursor_text_color       #08080C

# URL underline color when hovering with mouse
url_color               #BD00FF

# Kitty window border colors
active_border_color     #00F0FF
inactive_border_color   #00F0FF
bell_border_color       #FF2E97

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #E8E8F0
active_tab_background   #1B2C3D
inactive_tab_foreground #4A5A6D
inactive_tab_background #1B2C3D
tab_bar_background      none
tab_bar_margin_color    none

# Colors for marks (marked text in the terminal)
mark1_foreground #08080C
mark1_background #B4BEFE
mark2_foreground #08080C
mark2_background #CBA6F7
mark3_foreground #08080C
mark3_background #74C7EC

