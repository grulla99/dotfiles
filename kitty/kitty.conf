# Fonts
font_family D2Coding
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

macos_colorspace displayp3
startup_session ~/.config/kitty/last-session.kitty-session

# macOS key settings
macos_option_as_alt left
allow_remote_control no

# Nerd Fonts v2.3.3
# symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF,U+F0001-U+F1AF0 Symbols Nerd Font Mono

# macOS-style shortcuts
# On this keyboard/input-source setup, cmd+letter mappings can fail to match
# reliably by character name alone. Keep every cmd+letter shortcut paired with
# a native_code mapping from kitty --debug-input.

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+0x8 copy_to_clipboard
map cmd+0x9 paste_from_clipboard

# Shell editing
# Cmd+Z = undo
map cmd+z send_text all \x1f
map cmd+0x6 send_text all \x1f
# Cmd+Arrow = line start/end
map cmd+left send_text all \x01
map cmd+right send_text all \x05

# Cmd+A = delete current line (Ctrl+U)
map cmd+a send_text all \x15
map cmd+0x0 send_text all \x15

# Tabs and splits
map cmd+t launch --type=tab --cwd=current /Users/junho/.config/kitty/reset-shell.zsh
map cmd+d launch --location=vsplit --cwd=current /Users/junho/.config/kitty/reset-shell.zsh
map cmd+shift+d launch --location=hsplit --cwd=current /Users/junho/.config/kitty/reset-shell.zsh
map cmd+0x11 launch --type=tab --cwd=current /Users/junho/.config/kitty/reset-shell.zsh
map cmd+0x2 launch --location=vsplit --cwd=current /Users/junho/.config/kitty/reset-shell.zsh
map cmd+shift+0x2 launch --location=hsplit --cwd=current /Users/junho/.config/kitty/reset-shell.zsh

# Scroll to top/bottom
map cmd+up scroll_home
map cmd+down scroll_end

# Window management
map cmd+q combine : save_as_session --save-only ~/.config/kitty/last-session.kitty-session : quit
map cmd+0xc combine : save_as_session --save-only ~/.config/kitty/last-session.kitty-session : quit
map cmd+shift+left neighboring_window left
map cmd+shift+down neighboring_window down
map cmd+shift+up neighboring_window up
map cmd+shift+right neighboring_window right
map cmd+w close_window
map cmd+shift+w close_window
map cmd+0xd close_window

# Utilities
map cmd+g kitten hints --type=linenum --linenum-action=tab nvim +{line} {path}
map cmd+shift+0xd close_window
map cmd+0x5 kitten hints --type=linenum --linenum-action=tab nvim +{line} {path}
map alt+escape launch --stdin-source=@screen_scrollback --type=overlay vim -R -n -

cursor_shape beam
cursor_beam_thickness 1.5
cursor_trail 3
cursor_trail_decay 0.05 0.15
background_opacity 0.70
background_blur 40

# Hide taskbar or not
hide_window_decorations titlebar-only

# Mouse
mouse_hide_wait 3.0

# Tab navigation
# Cmd+number = goto tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+r set_tab_title
map cmd+0x12 goto_tab 1
map cmd+0x13 goto_tab 2
map cmd+0x14 goto_tab 3
map cmd+0x15 goto_tab 4
map cmd+0x17 goto_tab 5
map cmd+0x16 goto_tab 6
map cmd+0x1a goto_tab 7
map cmd+0x1c goto_tab 8
map cmd+0x19 goto_tab 9
map cmd+shift+0xf set_tab_title

# Window switching
# Cmd+Shift+number = focus window in current tab
map cmd+shift+1 first_window
map cmd+shift+2 second_window
map cmd+shift+3 third_window
map cmd+shift+4 fourth_window
map cmd+shift+5 fifth_window
map cmd+shift+6 sixth_window
map cmd+shift+7 seventh_window
map cmd+shift+8 eighth_window
map cmd+shift+9 ninth_window
map cmd+shift+0x12 first_window
map cmd+shift+0x13 second_window
map cmd+shift+0x14 third_window
map cmd+shift+0x15 fourth_window
map cmd+shift+0x17 fifth_window
map cmd+shift+0x16 sixth_window
map cmd+shift+0x1a seventh_window
map cmd+shift+0x1c eighth_window
map cmd+shift+0x19 ninth_window

# Tab bar
tab_bar_edge top
tab_bar_style custom
tab_bar_margin_height 5.0 5.0
tab_bar_margin_width 6.0
tab_bar_min_tabs 1
macos_menubar_title_max_length 20
tab_title_max_length 20
tab_title_template "{title.split(' ')[0]}"
active_tab_font_style bold
inactive_tab_font_style normal

enabled_layouts splits,stack
window_border_width 1pt
window_padding_width 2 4 2
window_margin_width 0

shell_integration disabled

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
